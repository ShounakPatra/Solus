name: Bug report
description: Report a reproducible problem in Solus.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Solus. Remove tokens and personal information from logs before submitting.

  - type: input
    id: version
    attributes:
      label: Solus version
      placeholder: "1.1.0"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: "Example: Pixel 8, Android 16"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model and runtime
      description: Include the model name and whether it uses MediaPipe or LiteRT-LM.
      placeholder: "Example: Qwen 2.5 1.5B Instruct, MediaPipe"

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Select...
        3. Send...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Drag files here. Do not include Hugging Face tokens or other secrets.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed secrets and personal information from the report.
          required: true
